# Render.com Blueprint – LoL Kontra Backend
# https://render.com/docs/blueprint-spec
#
# SETUP:
# 1. Create a free Neon.tech PostgreSQL database at https://neon.tech
# 2. Copy the connection string (DATABASE_URL)
# 3. Connect this repo to Render.com
# 4. Add DATABASE_URL as environment variable in Render dashboard
# 5. Deploy!

services:
  - type: web
    name: lol-kontra-backend
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: "cd backend && bash build.sh"
    startCommand: "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        sync: false  # Set manually from Neon.tech
      - key: DB_SSL_REQUIRE
        value: "true"
      - key: RENDER
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set to your Vercel URL: https://your-app.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        sync: false  # Set to: https://your-app.onrender.com,https://your-app.vercel.app
      - key: PYTHON_VERSION
        value: "3.12.0"
